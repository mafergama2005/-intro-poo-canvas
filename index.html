<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" href="./assets/img/conejo.png" type="image/png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Intro Canvas 2D</title>

    <style>
        body{
            background: linear-gradient(135deg,#d7f9ff,#fdf6c9);
            min-height:100vh;
        }

        .card-canvas{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.15);
            transition:transform .2s;
        }

        .card-canvas:hover{
            transform:scale(1.03);
        }

        footer{
            background:#212529;
            color:white;
            padding:15px;
            margin-top:40px;
        }

        canvas{
            border-radius:10px;
        }
    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🎨 Canvas 2D</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Objetos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Canvas</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<main class="container mt-4">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Objetos 2D con Programación Orientada a Objetos</h1>
        <p class="text-muted">Ejemplo de uso de Canvas 2D en JavaScript</p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card-canvas text-center">
                <h5 class="mb-3">Objeto 2D</h5>
                <canvas class="shadow" id="canvasOOP"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-canvas text-center">
                <h5 class="mb-3">Objeto con Random</h5>
                <canvas class="shadow" id="canvasRandom"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-canvas text-center">
                <h5 class="mb-3">Múltiples Objetos</h5>
                <canvas class="shadow" id="canvasMultiple"></canvas>
            </div>
        </div>

    </div>

</main>

<!-- FOOTER -->
<footer class="text-center">
    <p class="mb-0">
        Proyecto Canvas 2D | Ingeniería en Sistemas Computacionales 💻
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
